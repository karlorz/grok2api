name: GHCR Image

on:
  push:
    branches:
      - main
    tags:
      # upstream-style v3.0.2 and fork-style v3.0.2-0 / v3.0.2-1
      - "v*.*.*"
      - "v*.*.*-*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level defaults; publish jobs restate packages write for clarity.
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

# Optional override when default ghcr.io/owner/repo package is ACL-tainted (403).
# Set repo variable GHCR_IMAGE_NAME=ghcr.io/karlorz/grok2api-app if needed.
env:
  GHCR_IMAGE_NAME: ${{ vars.GHCR_IMAGE_NAME }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - name: Vet backend
        working-directory: backend
        run: go vet ./...

      - name: Verify Swagger document
        run: |
          make swagger
          git diff --exit-code -- backend/docs/docs.go backend/docs/swagger.json backend/docs/swagger.yaml

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: frontend
        run: pnpm lint

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

  check_ghcr_image:
    name: Build image (${{ matrix.arch }})
    if: github.event_name != 'push'
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=${{ matrix.arch }}
          provenance: false
          sbom: false

  build_ghcr_image:
    name: Publish image (${{ matrix.arch }})
    if: github.event_name == 'push'
    needs: verify
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image name
        id: image
        shell: bash
        run: |
          # Prefer classic ghcr.io/owner/repo. If that package is ACL-tainted after a
          # rename/re-fork (push 403), set repo variable GHCR_IMAGE_NAME to a clean name
          # e.g. ghcr.io/karlorz/grok2api-app
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          repo="$(printf '%s' "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')"
          if [[ -n "${GHCR_IMAGE_NAME:-}" ]]; then
            image_name="$GHCR_IMAGE_NAME"
          else
            image_name="ghcr.io/${owner}/${repo}"
          fi
          echo "name=$image_name" >> "$GITHUB_OUTPUT"
          echo "Using image: $image_name"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch,suffix=-${{ matrix.arch }}
            type=ref,event=tag,suffix=-${{ matrix.arch }}
            type=raw,value=latest-${{ matrix.arch }},enable=${{ github.ref == 'refs/heads/main' }}

      # Prefer optional GHCR_TOKEN (write:packages) when present; else GITHUB_TOKEN.
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max
          # provenance/sbom attestations often 403 on first package create / renamed repos
          provenance: false
          sbom: false

  merge:
    name: Merge image
    if: github.event_name == 'push'
    needs:
      - build_ghcr_image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image name
        id: image
        shell: bash
        run: |
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          repo="$(printf '%s' "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')"
          if [[ -n "${GHCR_IMAGE_NAME:-}" ]]; then
            image_name="$GHCR_IMAGE_NAME"
          else
            image_name="ghcr.io/${owner}/${repo}"
          fi
          echo "name=$image_name" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Create manifest list
        shell: bash
        run: |
          jq -cr '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON" | while read -r tag; do
            docker buildx imagetools create \
              -t "$tag" \
              "${tag}-amd64" \
              "${tag}-arm64"
          done

      - name: Inspect image
        run: docker buildx imagetools inspect "${{ steps.image.outputs.name }}:${{ steps.meta.outputs.version }}"

      - name: Make package public (best effort)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Links package to this repo and sets public visibility when possible.
          package="${GITHUB_REPOSITORY##*/}"
          owner="${GITHUB_REPOSITORY_OWNER}"
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/${package}/visibility" \
            -f visibility=public || true
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/${package}/versions" >/dev/null 2>&1 || true
          echo "package=${owner}/${package} image=${{ steps.image.outputs.name }}:${{ steps.meta.outputs.version }}"
