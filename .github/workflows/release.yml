name: Release

# Fork tags are distinct from upstream official tags:
#   upstream: v3.0.2
#   fork:     v3.0.2-0, v3.0.2-1, ...
# Prefer cutting tags with: ./scripts/fork-tag.sh --write && git commit && ./scripts/fork-tag.sh --release
on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing fork tag (e.g. v3.0.2-0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  github_release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          # Prefer fork scheme vX.Y.Z-N; still accept plain vX.Y.Z for compatibility.
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$ ]]; then
            echo "Invalid tag (want vX.Y.Z or fork vX.Y.Z-N): $tag" >&2
            exit 1
          fi
          echo "name=$tag" >> "$GITHUB_OUTPUT"
          if [[ "$tag" =~ -[0-9]+$ ]]; then
            echo "scheme=fork" >> "$GITHUB_OUTPUT"
            echo "upstream_base=${tag%-*}" >> "$GITHUB_OUTPUT"
            echo "fork_rev=${tag##*-}" >> "$GITHUB_OUTPUT"
          else
            echo "scheme=official-style" >> "$GITHUB_OUTPUT"
            echo "upstream_base=$tag" >> "$GITHUB_OUTPUT"
            echo "fork_rev=" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure tag exists
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags --force
          git rev-parse "refs/tags/${{ steps.tag.outputs.name }}" >/dev/null

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.name }}"
          notes_file="$(mktemp)"
          {
            echo "## ${tag}"
            echo
            echo "Fork version scheme: \`upstream vX.Y.Z\` → fork \`vX.Y.Z-0\`, \`vX.Y.Z-1\`, …"
            echo
            if [[ "${{ steps.tag.outputs.scheme }}" == "fork" ]]; then
              echo "- Upstream base: \`${{ steps.tag.outputs.upstream_base }}\`"
              echo "- Fork revision: \`${{ steps.tag.outputs.fork_rev }}\`"
              echo
            fi
            if [[ -f VERSION ]]; then
              echo "VERSION file: \`$(tr -d '[:space:]' < VERSION)\`"
              echo
            fi
            echo "### Images"
            echo
            repo_lc="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
            echo "- \`ghcr.io/${repo_lc}:${tag}\`"
            echo "- \`ghcr.io/${repo_lc}:latest\` (when built from main)"
            echo
            echo "### Install / update (binary on kr01)"
            echo
            echo '```bash'
            echo 'git fetch origin && git checkout main && git pull --ff-only'
            echo 'make update'
            echo '```'
            echo
            echo "### Commits"
            echo
            # Prefer notes since previous tag when available
            prev="$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || true)"
            if [[ -n "$prev" ]]; then
              git log --pretty=format:'- %s (%h)' "${prev}..${tag}"
            else
              git log --pretty=format:'- %s (%h)' -20 "${tag}"
            fi
            echo
          } > "$notes_file"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; updating notes"
            gh release edit "$tag" --notes-file "$notes_file" --title "$tag"
          else
            gh release create "$tag" \
              --title "$tag" \
              --notes-file "$notes_file" \
              --verify-tag
          fi
          gh release view "$tag" --json url,tagName,isDraft,isPrerelease
